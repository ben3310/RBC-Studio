name: verify

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  local-foundation:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install -e "services/gpu-worker[dev]"
      - run: npm run verify:config
      - run: npm run test:milestone1
      - run: python -m ruff check services/gpu-worker
      - run: npm run fixtures:contracts
      - name: Contract fixtures remain reproducible
        shell: pwsh
        run: |
          git diff --quiet --exit-code -- packages/contracts/fixtures
          if ($LASTEXITCODE -ne 0) {
            git diff -- packages/contracts/fixtures
            throw "Contract fixtures are stale. Run npm run fixtures:contracts."
          }
      - run: npm run test:e2e
