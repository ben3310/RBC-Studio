[build]
  publish = "."

[[redirects]]
  from = "/rbc-studio_4.html"
  to = "/index.html"
  status = 301
  force = true

# publish = "." serves the whole repository, so everything that is not a web
# asset is explicitly 404'd. Without these rules the business strategy docs,
# database schema, RLS policies, and test suite would be publicly readable.
# force = true makes the rule win even though the file exists on disk.
[[redirects]]
  from = "/infra/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/docs/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/services/*"
  to = "/index.html"
  status = 404
  force = true

