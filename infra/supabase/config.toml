# Local-only Supabase CLI configuration. This project is intentionally unlinked.
# Run Supabase commands from D:/RBC Studio/infra so the CLI discovers this file.
project_id = "rbc-content-factory-local"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:4173"
additional_redirect_urls = ["http://localhost:4173", "http://127.0.0.1:4173"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[analytics]
enabled = false

